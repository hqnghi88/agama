<!DOCTYPE html>
<html>
<head><title>CheerpJ Minimal Test</title>
<style>body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:20px}
#log{white-space:pre-wrap;background:#161b22;padding:12px;margin:10px 0;max-height:500px;overflow:auto;border:1px solid #30363d;font-size:13px}
.ok{color:#3fb950}.err{color:#f85149}.info{color:#58a6ff}.dim{color:#484f58}
button{background:#21262d;color:#58a6ff;border:1px solid #30363d;padding:8px 16px;cursor:pointer;border-radius:6px;font-family:monospace;margin:4px}
button:hover{background:#30363d}
</style>
</head>
<body>
<h2>CheerpJ Minimal Test</h2>
<div id="log"></div>
<button onclick="runTest()">Run Minimal Adapter</button>

<script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
<script>
var logEl = document.getElementById('log');
function log(m,c){logEl.innerHTML+='<span class="'+(c||'')+'">'+m+'</span>\n';logEl.scrollTop=logEl.scrollHeight}

async function runTest() {
    log('Init CheerpJ...','info');
    try { await cheerpjInit(); log('OK','ok'); } catch(e) { log('FAIL: '+e.message,'err'); return; }
    
    var cp = '/app/gama-jars/gama-browser-bridge.jar';
    log('Running with classpath: '+cp,'dim');
    log('Calling cheerpjRunMain(gama.browser.GamaBrowserBridge, compile, test, arg3)...','info');
    
    try {
        var t0 = Date.now();
        var code = await Promise.race([
            cheerpjRunMain('gama.browser.GamaBrowserBridge', cp, 'compile', 'test arg 3'),
            new Promise(function(_,re){setTimeout(function(){re(new Error('TIMEOUT'))},30000)})
        ]);
        log('Exit code: '+code+' ('+( Date.now()-t0)+'ms)', code===0?'ok':'err');
    } catch(e) {
        log('ERROR: '+e.message+' | type: '+typeof e+' | keys: '+Object.keys(e).join(','),'err');
        log('Full error: '+JSON.stringify(e),'err');
    }
}
</script>
</body>
</html>
