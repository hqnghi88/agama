name: Release

on:
  push:
    tags:
      - "*"
      - "!mobile-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Download GAMA release
        run: |
          curl -L -o GAMA_Linux.zip \
            "https://github.com/gama-platform/gama/releases/download/2026.07.0/GAMA_2026.07.0_Linux_with_JDK_09.07.26_0b8cf07.zip"

      - name: Set Release Tag
        id: set_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=draft-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gama-release-archive
          path: GAMA_Linux.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: gama-release-archive
          path: release-assets

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/GAMA_Linux.zip
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: "Release ${{ needs.build.outputs.tag_name }}"
