name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Build project
        run: |
          chmod +x travis/build.sh
          bash travis/build.sh
        env:
          MAVEN_OPTS: "-Xmx15g"

      - name: Set Release Tag
        id: set_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=draft-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gama-compiled-archive
          path: |
            gama.product/target/products/gama.application-linux.gtk.aarch64.tar.gz
            gama.product/target/products/gama.headless-linux.gtk.aarch64.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: gama-compiled-archive
          path: release-assets

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: "Release ${{ needs.build.outputs.tag_name }}"
