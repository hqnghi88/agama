name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    outputs:
      tag_name: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: mobile-app/android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Set Release Tag
        id: set_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=mobile-draft-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gama-mobile-apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: gama-mobile-apk
          path: release-assets

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/app-release.apk
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: "GAMA Mobile ${{ needs.build.outputs.tag_name }}"
